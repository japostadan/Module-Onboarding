<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>My form exercise</title>
    <meta name="description" content="Form Validation" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header>
      <h1>Product Pick</h1>
    </header>
    <main>
      <form>
        <!-- write your html here-->
        <!-- 
          try writing out the requirements first as comments
        this will also help you fill in your PR message later

			## Task
			We are selling t-shirts. Write a form to collect the following data:
			Our customers already have accounts, so we know their addresses and charging details already. We don't need to collect that data. We want to confirm they are the right person, then get them to choose a colour and size.
			Writing that out as a series of questions to ask yourself:
			
			1. What is the customer's name? I must collect this data, and validate it. But what is a valid name? I must decide something.
			2. What is the customer's email? I must make sure the email is valid. Email addresses have a consistent pattern.
			3. What colour should this t-shirt be? I must give 3 options. How will I make sure they don't pick other colours?
			4. What size does the customer want? I must give the following 6 options: XS, S, M, L, XL, XXL
			
			All fields are required.
			Do not write a form action for this project.
		-->
        <!-- Customer Name -->
        <label for="name">Full Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your full name"
          required
          pattern="^[A-Za-z\s'-]{2,}$"
          title="Name should only contain letters, spaces, apostrophes, or hyphens."
          autocomplete="name"
        />

        <!-- Customer Email -->
        <label for="email">Email Address:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@email.com"
          required
          autocomplete="email"
        />

        <!-- T-Shirt Colour -->
        <label for="color">T-Shirt Colour:</label>
        <select id="color" name="color" required>
          <option value="">-- Please choose a colour --</option>
          <option value="black">Black</option>
          <option value="white">White</option>
          <option value="blue">Blue</option>
        </select>

        <!-- T-Shirt Size -->
        <label for="size">T-Shirt Size:</label>
        <select id="size" name="size" required>
          <option value="">-- Please choose a size --</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
        </select>

        <!-- Submit Button -->
        <button type="submit">Submit Order</button>
      </form>
    </main>
    <footer>
      <!-- change to your name-->
      <h2>By James</h2>
    </footer>
  </body>
</html>
