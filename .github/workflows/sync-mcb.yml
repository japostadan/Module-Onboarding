name: Sync to MCB

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify MCB superproject
        run: |
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.MCB_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/japostadan/Migracode/dispatches \
            -d "{\"event_type\":\"submodule-updated\",\"client_payload\":{\"module\":\"${{ github.event.repository.name }}\"}}"
